<!DOCTYPE html>
<html lang="es">

<head>
    <title>Centro de Cuidado de Niños con Autismo - Galería de Fotos</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos.css" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #4CAF50;
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            grid-gap: 20px;
        }

        .image {
            border: 1px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
        }

        .image img {
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>
    <header>
        <h1>Galería de Fotos del Centro de Cuidado de Niños con Autismo</h1>
    </header>

    <main>
        <section class="gallery">
            <div class="image">
                <img src="https://via.placeholder.com/300x200" alt="Niños disfrutando de una actividad en el centro">
            </div>
            <div class="image">
                <img src="https://via.placeholder.com/300x200" alt="Actividades educativas">
            </div>
            <div class="image">
                <img src="https://via.placeholder.com/300x200" alt="Niños participando en terapia">
            </div>
        </section>
    </main>

    <footer>
        <p>© 2024 Centro de Cuidado de Niños con Autismo. Todos los derechos reservados.</p>
    </footer>
</body>

</html>
